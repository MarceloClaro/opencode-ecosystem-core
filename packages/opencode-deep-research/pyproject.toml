[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "opencode-deep-research"
version = "1.0.0"
description = "DeepEvidence-style hierarchical deep research with evidence graphs (R102)"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
keywords = ["deep-research", "evidence-graph", "multi-agent", "research"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Science/Research",
    "Programming Language :: Python :: 3.10",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

[project.urls]
Repository = "https://github.com/opencode-ecosystem-core"

[tool.setuptools.packages.find]
where = ["."]
include = ["opencode_deep_research*"]
