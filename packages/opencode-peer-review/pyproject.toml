[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "opencode-peer-review"
version = "1.0.0"
description = "Agentic Peer Review with Rubric Engine, Review Ledger, and Graph-Anchored Auditing (R103)"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
keywords = ["peer-review", "agentic", "rubric", "research", "auditing"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Science/Research",
    "Programming Language :: Python :: 3.10",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

[project.urls]
Repository = "https://github.com/opencode-ecosystem-core"

[tool.setuptools.packages.find]
where = ["."]
include = ["opencode_peer_review*"]
