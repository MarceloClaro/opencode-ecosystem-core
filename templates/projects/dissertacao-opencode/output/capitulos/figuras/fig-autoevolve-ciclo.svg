  <rect x="20" y="345" width="710" height="105" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="40" y="365" font-size="9" fill="#334155" font-weight="bold">Metacognicao Artificial (3 niveis):</text>
  <text x="40" y="380" font-size="8" fill="#64748b">Nivel 1 — Monitoramento: REFLECT detecta padroes de falha nos outputs</text>
  <text x="40" y="395" font-size="8" fill="#64748b">Nivel 2 — Controle: EVOLVE ajusta comportamento (habilita/desabilita skills)</text>
  <text x="40" y="410" font-size="8" fill="#64748b">Nivel 3 — Meta-aprendizado: 18 ciclos documentados constituem registro de "aprender sobre como aprender"</text>
  <text x="40" y="430" font-size="8" fill="#6366f1" font-weight="bold">Validacao: 255 CTs · 8 suites TDD · 100% aprovacao · Pesquisa-Acao (Lewin, 1946) ≡ PLAN→ACT→REFLECT→EVOLVE</text>
