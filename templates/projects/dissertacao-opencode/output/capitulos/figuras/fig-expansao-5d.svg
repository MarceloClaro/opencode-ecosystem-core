<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 400" font-family="Arial, sans-serif">
  <!-- ===== COMENTÁRIO DIDÁTICO =====
  Esta figura mostra a Expansão Epistemológica 5D aplicada pelo Scanner
  Noológico a um estudo de caso em psicologia clínica.
  
  COMO LER:
  - LADO ESQUERDO: o artigo original cobria apenas 12% das 92 categorias
    (principalmente D2-Teórica e D3-Metodológica)
  - LADO DIREITO: após a Expansão 5D, a cobertura salta para 35%
    (+192%), incorporando 5 novas camadas de análise
  
  As 5 camadas adicionadas (numeradas 1-5) representam perspectivas que
  a literatura convencional tipicamente ignora:
    1. Teoria dos Jogos (Nash, Shapley, Axelrod)
    2. Nível Sistêmico (OMS mhGAP, Portaria 3.088/2011)
    3. Neurociências (Etkin, Insel RDoC)
    4. Longitudinal (Cuijpers, follow-up 12+ meses)
    5. Diversificação de Dados (Smith, triangulação multimodal)
  -->

  <text x="375" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">Expansão Epistemológica 5D — Scanner Noológico</text>
  <text x="375" y="38" text-anchor="middle" font-size="10" fill="#64748b">Estudo de caso: psicologia clínica (transtornos de ansiedade) • Cobertura: 12% → 35% (+192%)</text>

  <!-- Lado Esquerdo: ANTES -->
  <rect x="15" y="55" width="345" height="315" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="188" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="#991b1b">ANTES — Artigo Original</text>
  <text x="188" y="95" text-anchor="middle" font-size="11" fill="#7f1d1d">Cobertura: 12% (11/92 categorias)</text>

  <!-- Círculo de cobertura ANTES -->
  <circle cx="188" cy="170" r="55" fill="none" stroke="#fca5a5" stroke-width="2"/>
  <circle cx="188" cy="170" r="12" fill="#ef4444" opacity="0.6"/>
  <text x="188" y="164" text-anchor="middle" font-size="22" font-weight="bold" fill="#991b1b">12%</text>

  <rect x="35" y="240" width="305" height="120" rx="5" fill="#fff" stroke="#fecaca"/>
  <text x="188" y="260" text-anchor="middle" font-size="10" font-weight="bold" fill="#475569">Dimensões cobertas (2/10):</text>
  <text x="50" y="280" font-size="9" fill="#991b1b">D2 — Teórica (modelo cognitivo-comportamental)</text>
  <text x="50" y="298" font-size="9" fill="#991b1b">D3 — Metodológica (ensaio clínico randomizado)</text>
  <text x="50" y="320" font-size="9" fill="#b91c1c" font-weight="bold">8 dimensões com cobertura ZERO</text>
  <text x="50" y="340" font-size="9" fill="#b91c1c" font-weight="bold">4 pontos cegos críticos</text>

  <!-- Seta central -->
  <line x1="370" y1="212" x2="390" y2="212" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
  <text x="380" y="205" text-anchor="middle" font-size="9" fill="#475569">Scanner</text>
  <text x="380" y="230" text-anchor="middle" font-size="9" fill="#475569">Noológico</text>

  <!-- Lado Direito: DEPOIS -->
  <rect x="395" y="55" width="345" height="315" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="568" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="#14532d">DEPOIS — Com Expansão 5D</text>
  <text x="568" y="95" text-anchor="middle" font-size="11" fill="#166534">Cobertura: 35% (32/92 categorias) • +192%</text>

  <!-- Círculo de cobertura DEPOIS -->
  <circle cx="568" cy="170" r="55" fill="none" stroke="#86efac" stroke-width="2"/>
  <circle cx="568" cy="170" r="38" fill="#22c55e" opacity="0.5"/>
  <text x="568" y="164" text-anchor="middle" font-size="22" font-weight="bold" fill="#14532d">35%</text>

  <!-- As 5 camadas adicionadas -->
  <rect x="415" y="240" width="305" height="120" rx="5" fill="#fff" stroke="#bbf7d0"/>
  <text x="568" y="258" text-anchor="middle" font-size="10" font-weight="bold" fill="#475569">5 camadas adicionadas:</text>

  <rect x="420" y="266" width="295" height="18" rx="3" fill="#dbeafe"/>
  <text x="430" y="279" font-size="8.5" fill="#1e40af">1. Teoria dos Jogos (Nash, Shapley, Axelrod)</text>

  <rect x="420" y="288" width="295" height="18" rx="3" fill="#fef3c7"/>
  <text x="430" y="301" font-size="8.5" fill="#92400e">2. Nível Sistêmico (OMS mhGAP, Portaria 3.088)</text>

  <rect x="420" y="310" width="295" height="18" rx="3" fill="#fce7f3"/>
  <text x="430" y="323" font-size="8.5" fill="#9d174d">3. Neurociências (Etkin 2015, Insel RDoC 2010)</text>

  <rect x="420" y="328" width="145" height="18" rx="3" fill="#e0e7ff"/>
  <text x="430" y="341" font-size="8.5" fill="#3730a3">4. Longitudinal (Cuijpers)</text>
  <rect x="570" y="328" width="145" height="18" rx="3" fill="#e0e7ff"/>
  <text x="580" y="341" font-size="8.5" fill="#3730a3">5. Dados (Smith)</text>

  <!-- Resultado -->
  <rect x="150" y="380" width="450" height="22" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="375" y="395" text-anchor="middle" font-size="10" fill="#475569">8 pontos cegos → 3 (-63%) • Score ecossistema: 85 → 99/100 (+16,5%) • 25 citações com DOI</text>

  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#475569"/></marker>
  </defs>
</svg>
