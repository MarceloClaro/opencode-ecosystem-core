<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 430" font-family="Arial, sans-serif">
  <!-- ===== COMENTÁRIO DIDÁTICO =====
  Esta figura mostra a anatomia de uma nota de rodapé TSAC (Transparent
  Source-Attributed Citation). Cada nota tem 4 camadas obrigatórias:
  
  CAMADA 1 — Referência ABNT completa com DOI verificável
  CAMADA 2 — Trecho Original (no idioma da fonte)
  CAMADA 3 — Tradução (para PT-BR, se a fonte não estiver em português)
  CAMADA 4 — Fichamento Crítico Contextualizado (por que esta citação
             é relevante para ESTE parágrafo específico?)
  
  Este protocolo garante que QUALQUER leitor possa verificar cada
  afirmação da dissertação sem precisar confiar no autor.
  -->

  <!-- Título -->
  <text x="375" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">Anatomia de uma Nota de Rodapé TSAC</text>
  <text x="375" y="38" text-anchor="middle" font-size="10" fill="#64748b">Protocolo Transparent Source-Attributed Citation — 4 camadas de verificabilidade</text>

  <!-- Mensagem central -->
  <rect x="175" y="50" width="400" height="28" rx="5" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="375" y="69" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">De "confiança no autor" para "verificabilidade por qualquer leitor"</text>

  <!-- Camada 1 — Referência + DOI -->
  <rect x="15" y="90" width="720" height="62" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="15" y="90" width="28" height="62" rx="6" fill="#3b82f6"/>
  <text x="29" y="126" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">1</text>
  <text x="55" y="112" font-size="12" font-weight="bold" fill="#1e3a5f">CAMADA 1 — Referência ABNT + DOI verificável</text>
  <text x="55" y="130" font-size="10" fill="#475569">SOBRENOME, Nome. Título. Revista/Editora, vol., p., ano. DOI: https://doi.org/10.xxxx/xxxxx</text>
  <text x="55" y="145" font-size="9" fill="#64748b" font-style="italic">Todo material citável deve ter DOI válido. O agente de validação testa cada DOI antes da inclusão.</text>

  <!-- Seta -->
  <line x1="375" y1="152" x2="375" y2="168" stroke="#475569" stroke-width="1.2" marker-end="url(#a)"/>

  <!-- Camada 2 — Trecho Original -->
  <rect x="15" y="170" width="720" height="50" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="15" y="170" width="28" height="50" rx="6" fill="#f59e0b"/>
  <text x="29" y="200" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">2</text>
  <text x="55" y="192" font-size="12" font-weight="bold" fill="#92400e">CAMADA 2 — Trecho Original (idioma da fonte)</text>
  <text x="55" y="210" font-size="10" fill="#475569">"The criterion of the scientific status of a theory is its falsifiability, or refutability, or testability."</text>

  <!-- Seta -->
  <line x1="375" y1="220" x2="375" y2="236" stroke="#475569" stroke-width="1.2" marker-end="url(#a)"/>

  <!-- Camada 3 — Tradução -->
  <rect x="15" y="238" width="720" height="50" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="15" y="238" width="28" height="50" rx="6" fill="#22c55e"/>
  <text x="29" y="268" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">3</text>
  <text x="55" y="260" font-size="12" font-weight="bold" fill="#14532d">CAMADA 3 — Tradução (português brasileiro formal)</text>
  <text x="55" y="278" font-size="10" fill="#475569">"O critério do estatuto científico de uma teoria é sua falseabilidade, ou refutabilidade, ou testabilidade."</text>

  <!-- Seta -->
  <line x1="375" y1="288" x2="375" y2="304" stroke="#475569" stroke-width="1.2" marker-end="url(#a)"/>

  <!-- Camada 4 — Fichamento Crítico -->
  <rect x="15" y="306" width="720" height="72" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="15" y="306" width="28" height="72" rx="6" fill="#ef4444"/>
  <text x="29" y="347" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">4</text>
  <text x="55" y="326" font-size="12" font-weight="bold" fill="#991b1b">CAMADA 4 — Fichamento Crítico Contextualizado</text>
  <text x="55" y="344" font-size="9.5" fill="#475569">Este trecho é relevante para o parágrafo atual porque [justificativa contextualizada].</text>
  <text x="55" y="360" font-size="9.5" fill="#475569">A citação [apoia/contradiz/complementa] a ideia de [tese do parágrafo], fornecendo [evidência/perspectiva] que [impacto].</text>
  <text x="55" y="375" font-size="9" fill="#94a3b8" font-style="italic">Diferenciais: contextualizado ao PARÁGRAFO (não ao capítulo) • Justifica POR QUE esta citação (não outra) • Conecta ao argumento</text>

  <!-- Conclusão -->
  <rect x="150" y="395" width="450" height="28" rx="5" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="375" y="414" text-anchor="middle" font-size="10" fill="#475569">87 palavras banidas (detecção anti-IA) + 42 notas TSAC nesta dissertação</text>

  <defs>
    <marker id="a" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5 Z" fill="#475569"/></marker>
  </defs>
</svg>
