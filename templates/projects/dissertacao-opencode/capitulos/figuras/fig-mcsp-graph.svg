<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/></marker>
    <marker id="arrowG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#10b981"/></marker>
    <marker id="arrowO" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#f59e0b"/></marker>
  </defs>

  <text x="350" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">MCSP — Minimum Capability Set Problem (SPEC-032)</text>
  <text x="350" y="38" text-anchor="middle" font-size="10" fill="#64748b">Formalizacao: G = (V, E) · S = estado atual · T = alvos · C = conjunto minimo</text>

  <rect x="30" y="60" width="200" height="80" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="130" y="82" text-anchor="middle" font-size="11" fill="#047857" font-weight="bold">S = Estado Atual</text>
  <text x="130" y="98" text-anchor="middle" font-size="8" fill="#065f46">Capacidades cobertas</text>
  <text x="130" y="112" text-anchor="middle" font-size="8" fill="#065f46">68/92 categorias (74%)</text>
  <text x="130" y="128" text-anchor="middle" font-size="8" fill="#6ee7b7">paradigmas, dominios...</text>

  <rect x="470" y="60" width="200" height="80" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="570" y="82" text-anchor="middle" font-size="11" fill="#b45309" font-weight="bold">T = Estado Alvo</text>
  <text x="570" y="98" text-anchor="middle" font-size="8" fill="#92400e">Requisitos teleologicos</text>
  <text x="570" y="112" text-anchor="middle" font-size="8" fill="#92400e">dos 8 goal types</text>
  <text x="570" y="128" text-anchor="middle" font-size="8" fill="#fcd34d">bayesiano, metacognitivo...</text>

  <line x1="230" y1="100" x2="460" y2="100" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="6,3"/>
  <text x="345" y="93" text-anchor="middle" font-size="8" fill="#64748b">gap teleologico</text>

  <rect x="150" y="180" width="400" height="90" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="350" y="202" text-anchor="middle" font-size="12" fill="#4338ca" font-weight="bold">C = Conjunto Minimo de Capacidades</text>
  <text x="350" y="220" text-anchor="middle" font-size="9" fill="#4338ca">backward_closure + greedy_select + topological_order</text>
  <text x="350" y="238" text-anchor="middle" font-size="9" fill="#6366f1">Cost(C) = sum(1-weight) · |C| minimo · S U C contem T · prereq(c) contido em S U C</text>
  <text x="350" y="258" text-anchor="middle" font-size="8" fill="#a5b4fc">14 CTs (100%) · O(|V|^2|E|) · heuristica gulosa com garantia logaritmica</text>

  <line x1="130" y1="140" x2="230" y2="180" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowG)"/>
  <line x1="570" y1="140" x2="470" y2="180" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowO)"/>

  <text x="350" y="318" text-anchor="middle" font-size="10" font-weight="bold" fill="#334155">Exemplo: Grafo de Dependencias com S, T e C</text>

  <circle cx="160" cy="370" r="16" fill="#d1fae5" stroke="#10b981" stroke-width="2"/><text x="160" y="374" text-anchor="middle" font-size="8" fill="#065f46" font-weight="bold">dedutivo</text>
  <circle cx="340" cy="370" r="16" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/><text x="340" y="374" text-anchor="middle" font-size="8" fill="#92400e" font-weight="bold">probabil.</text>
  <circle cx="500" cy="370" r="16" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/><text x="500" y="374" text-anchor="middle" font-size="8" fill="#991b1b" font-weight="bold">Nash</text>

  <line x1="176" y1="362" x2="324" y2="362" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="250" y="356" text-anchor="middle" font-size="8" fill="#64748b">habilita (0.6)</text>
  <line x1="356" y1="378" x2="484" y2="378" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="420" y="392" text-anchor="middle" font-size="8" fill="#64748b">habilita (0.5)</text>

  <text x="350" y="412" text-anchor="middle" font-size="10" fill="#6366f1" font-weight="bold">C = {"raciocinio.Probabilistico"} · cost=1.0 · cobertura=100% · order=["dedutivo","probabil.","Nash"]</text>
</svg>