<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#8b5cf6"/></linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#0ea5e9"/><stop offset="100%" stop-color="#06b6d4"/></linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#34d399"/></linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#fbbf24"/></linearGradient>
    <linearGradient id="g5" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#ef4444"/><stop offset="100%" stop-color="#f87171"/></linearGradient>
    <linearGradient id="g6" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#a78bfa"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/></filter>
  </defs>

  <text x="400" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">Ecossistema de Scanners Epistemologicos</text>
  <text x="400" y="38" text-anchor="middle" font-size="10" fill="#64748b">5 scanners + MCSP Solver | 255 CTs validados (SPEC-025 a SPEC-032)</text>

  <rect x="20" y="55" width="130" height="70" rx="8" fill="url(#g1)" filter="url(#shadow)"/>
  <text x="85" y="78" text-anchor="middle" font-size="10" fill="white" font-weight="bold">Noological</text>
  <text x="85" y="93" text-anchor="middle" font-size="8" fill="#e0e7ff">"O que nao existe?"</text>
  <text x="85" y="108" text-anchor="middle" font-size="8" fill="#c7d2fe">10 dims x 92 cats</text>

  <rect x="175" y="55" width="130" height="70" rx="8" fill="url(#g2)" filter="url(#shadow)"/>
  <text x="240" y="78" text-anchor="middle" font-size="10" fill="white" font-weight="bold">Teleologico</text>
  <text x="240" y="93" text-anchor="middle" font-size="8" fill="#e0f2fe">"O que deveria existir?"</text>
  <text x="240" y="108" text-anchor="middle" font-size="8" fill="#bae6fd">8 goal types</text>

  <rect x="330" y="55" width="130" height="70" rx="8" fill="url(#g3)" filter="url(#shadow)"/>
  <text x="395" y="78" text-anchor="middle" font-size="10" fill="white" font-weight="bold">CrossValidation</text>
  <text x="395" y="93" text-anchor="middle" font-size="8" fill="#d1fae5">"O que sustenta o que?"</text>
  <text x="395" y="108" text-anchor="middle" font-size="8" fill="#a7f3d0">73 arestas</text>

  <rect x="485" y="55" width="130" height="70" rx="8" fill="url(#g4)" filter="url(#shadow)"/>
  <text x="550" y="78" text-anchor="middle" font-size="10" fill="white" font-weight="bold">Polymathic</text>
  <text x="550" y="93" text-anchor="middle" font-size="8" fill="#fef3c7">"Quem ja resolveu?"</text>
  <text x="550" y="108" text-anchor="middle" font-size="8" fill="#fde68a">30 dominios</text>

  <rect x="640" y="55" width="130" height="70" rx="8" fill="url(#g5)" filter="url(#shadow)"/>
  <text x="705" y="78" text-anchor="middle" font-size="10" fill="white" font-weight="bold">Trajectory</text>
  <text x="705" y="93" text-anchor="middle" font-size="8" fill="#fee2e2">"Qual o caminho?"</text>
  <text x="705" y="108" text-anchor="middle" font-size="8" fill="#fecaca">4 cenarios</text>

  <polygon points="155,80 170,90 155,100" fill="#94a3b8"/>
  <polygon points="310,80 325,90 310,100" fill="#94a3b8"/>
  <polygon points="465,80 480,90 465,100" fill="#94a3b8"/>
  <polygon points="620,80 635,90 620,100" fill="#94a3b8"/>

  <rect x="225" y="155" width="340" height="60" rx="8" fill="url(#g6)" filter="url(#shadow)"/>
  <text x="395" y="178" text-anchor="middle" font-size="12" fill="white" font-weight="bold">MCSP Solver (SPEC-032)</text>
  <text x="395" y="195" text-anchor="middle" font-size="9" fill="#e0e7ff">"Qual o conjunto minimo para chegar la?"</text>

  <line x1="85" y1="125" x2="310" y2="155" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="240" y1="125" x2="350" y2="155" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="395" y1="125" x2="390" y2="155" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="550" y1="125" x2="440" y2="155" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="705" y1="125" x2="480" y2="155" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>

  <rect x="20" y="245" width="760" height="70" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="40" y="263" font-size="10" font-weight="bold" fill="#334155">Pipeline: Estado Atual → NoologicalScanner (ausencias) → Teleologico (requisitos) → CrossVal (dependencias) → Polymathic (analogias) → Trajectory (cenarios) → MCSP (conjunto minimo) → Roadmap</text>
  <text x="40" y="282" font-size="9" fill="#64748b">As 5 Perguntas: Descritiva → Prescritiva → Estrutural → Comparativa → Preditiva</text>
  <text x="40" y="300" font-size="9" fill="#6366f1" font-weight="bold">Validacao: 255 CTs em 8 suites TDD (100% aprovacao) · 5.0s execucao · 169 SPECs</text>

  <text x="400" y="355" text-anchor="middle" font-size="12" fill="#475569" font-weight="bold">As 5 Perguntas que o Ecossistema de Scanners Responde</text>

  <rect x="30" y="375" width="140" height="50" rx="6" fill="#e0e7ff" stroke="#6366f1" stroke-width="1"/>
  <text x="100" y="398" text-anchor="middle" font-size="9" fill="#4338ca" font-weight="bold">O que NAO existe?</text>
  <text x="100" y="414" text-anchor="middle" font-size="7" fill="#6366f1">Descritiva</text>

  <rect x="185" y="375" width="140" height="50" rx="6" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1"/>
  <text x="255" y="398" text-anchor="middle" font-size="9" fill="#0369a1" font-weight="bold">O que DEVERIA existir?</text>
  <text x="255" y="414" text-anchor="middle" font-size="7" fill="#0ea5e9">Prescritiva</text>

  <rect x="340" y="375" width="140" height="50" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
  <text x="410" y="398" text-anchor="middle" font-size="9" fill="#047857" font-weight="bold">O que SUSTENTA o que?</text>
  <text x="410" y="414" text-anchor="middle" font-size="7" fill="#10b981">Estrutural</text>

  <rect x="495" y="375" width="140" height="50" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="565" y="398" text-anchor="middle" font-size="9" fill="#b45309" font-weight="bold">Quem ja RESOLVEU?</text>
  <text x="565" y="414" text-anchor="middle" font-size="7" fill="#f59e0b">Comparativa</text>

  <rect x="650" y="375" width="130" height="50" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text x="715" y="398" text-anchor="middle" font-size="9" fill="#b91c1c" font-weight="bold">Qual o CAMINHO?</text>
  <text x="715" y="414" text-anchor="middle" font-size="7" fill="#ef4444">Preditiva</text>
</svg>