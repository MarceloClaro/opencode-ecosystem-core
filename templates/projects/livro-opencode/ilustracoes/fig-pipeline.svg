<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 320" font-family="Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#475569"/>
    </marker>
    <marker id="arrRed" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#ef4444"/>
    </marker>
  </defs>

  <!-- Título -->
  <text x="375" y="22" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b">Pipeline MASWOS v5.0 — 8 Estágios com 49 Agentes</text>

  <!-- Linha 1: Estágios 0-3 -->
  <rect x="25"  y="40" width="160" height="58" rx="5" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="105" y="62" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e3a5f">E0 — Diagnóstico</text>
  <text x="105" y="80" text-anchor="middle" font-size="10" fill="#475569">Agentes 00–01</text>
  <text x="105" y="93" text-anchor="middle" font-size="9" fill="#94a3b8">Escopo • Tipo doc</text>

  <rect x="205" y="40" width="160" height="58" rx="5" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="285" y="62" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e3a5f">E1 — Busca</text>
  <text x="285" y="80" text-anchor="middle" font-size="10" fill="#475569">Agentes 02–03</text>
  <text x="285" y="93" text-anchor="middle" font-size="9" fill="#94a3b8">10+ fontes • Sci-Hub</text>

  <rect x="385" y="40" width="160" height="58" rx="5" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="465" y="62" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e3a5f">E2 — Estrutura</text>
  <text x="465" y="80" text-anchor="middle" font-size="10" fill="#475569">Agentes 04–05</text>
  <text x="465" y="93" text-anchor="middle" font-size="9" fill="#94a3b8">IMRAD • CARS • 8 eixos</text>

  <rect x="565" y="40" width="160" height="58" rx="5" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="645" y="62" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e3a5f">E3 — Método</text>
  <text x="645" y="80" text-anchor="middle" font-size="10" fill="#475569">Agentes 06–07</text>
  <text x="645" y="93" text-anchor="middle" font-size="9" fill="#94a3b8">SDD+TDD • Cross-Val</text>

  <!-- Setas linha 1 -->
  <line x1="185" y1="69" x2="198" y2="69" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="365" y1="69" x2="378" y2="69" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="545" y1="69" x2="558" y2="69" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Seta vertical entre linhas -->
  <path d="M645,98 L645,135" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- Linha 2: Estágios 4-7 -->
  <rect x="25"  y="140" width="160" height="58" rx="5" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="105" y="162" text-anchor="middle" font-size="12" font-weight="bold" fill="#14532d">E4 — Redação</text>
  <text x="105" y="180" text-anchor="middle" font-size="10" fill="#475569">Agentes 08–11</text>
  <text x="105" y="193" text-anchor="middle" font-size="9" fill="#94a3b8">Visualização • Resultados</text>

  <rect x="205" y="140" width="160" height="58" rx="5" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="285" y="162" text-anchor="middle" font-size="12" font-weight="bold" fill="#14532d">E5 — Auditoria</text>
  <text x="285" y="180" text-anchor="middle" font-size="10" fill="#475569">Agentes 12–15</text>
  <text x="285" y="193" text-anchor="middle" font-size="9" fill="#94a3b8">TSAC • Qualis QA</text>

  <rect x="385" y="140" width="160" height="58" rx="5" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="465" y="162" text-anchor="middle" font-size="12" font-weight="bold" fill="#14532d">E6 — Exportação</text>
  <text x="465" y="180" text-anchor="middle" font-size="10" fill="#475569">Ag. 16–17,33,36</text>
  <text x="465" y="193" text-anchor="middle" font-size="9" fill="#94a3b8">LaTeX/PDF • DOCX</text>

  <rect x="565" y="140" width="160" height="58" rx="5" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="645" y="162" text-anchor="middle" font-size="12" font-weight="bold" fill="#14532d">E7 — Revisão</text>
  <text x="645" y="180" text-anchor="middle" font-size="10" fill="#475569">Ag. 31,44–45</text>
  <text x="645" y="193" text-anchor="middle" font-size="9" fill="#94a3b8">Peer Review • Correção</text>

  <!-- Setas linha 2 -->
  <line x1="185" y1="169" x2="198" y2="169" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="365" y1="169" x2="378" y2="169" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="545" y1="169" x2="558" y2="169" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Loop de correção -->
  <path d="M645,198 L645,225 L285,225 L285,198" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6,3" fill="none" marker-end="url(#arrRed)"/>
  <text x="465" y="220" text-anchor="middle" font-size="10" fill="#ef4444" font-weight="bold">Loop corretivo (score &lt; 95)</text>

  <!-- Anotação -->
  <text x="375" y="270" text-anchor="middle" font-size="11" fill="#475569">8 estágios × 49 agentes = pipeline acadêmico completo Qualis A1</text>
</svg>
