<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 440" font-family="Arial, sans-serif">
  <!-- ===== COMENTÁRIO DIDÁTICO =====
  Esta figura mostra o Tripé da Economia de Tokens (R18), a arquitetura
  de governança mais madura do ecossistema OpenCode.
  
  COMO LER: Três pilares interdependentes sustentam o uso eficiente de
  recursos computacionais (tokens de LLM) no ecossistema:
  
  GOVERNANÇA (azul) — Quem pode usar quanto?
    • Agent Registry classifica agentes em tiers (bronze/silver/gold)
    • Baseado em histórico de desempenho e score Qualis produzido
    • Agentes gold têm prioridade; bronze têm quotas restritas
  
  ECONOMIA (verde) — Quanto custa usar?
    • Fee Market dinâmico: preço dos tokens varia com a demanda
    • Staking (7 dias): agentes "apostam" tokens para ganhar prioridade
    • Slashing: comportamento malicioso resulta em confisco das apostas
  
  AUDITORIA (vermelho) — Como saber se está sendo usado corretamente?
    • Ledger imutável com hash SHA-256 para cada transação
    • Trilha de auditoria completa: quem usou, quando, quanto, resultado
    • Detecção de anomalias: agentes que consomem muito e produzem pouco
  -->

  <text x="375" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">Tripé da Economia de Tokens — OpenCode R18</text>
  <text x="375" y="38" text-anchor="middle" font-size="10" fill="#64748b">Sistema de incentivos para uso eficiente de recursos computacionais no ecossistema multiagente</text>

  <!-- Pilar 1: Governança -->
  <rect x="15" y="55" width="230" height="350" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <rect x="15" y="55" width="230" height="40" rx="8" fill="#3b82f6"/>
  <text x="130" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">GOVERNANÇA</text>

  <text x="130" y="115" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e3a5f">Agent Registry</text>
  <text x="130" y="132" text-anchor="middle" font-size="9" fill="#475569">Registro de 128 agentes</text>

  <!-- Tiers -->
  <rect x="30" y="145" width="200" height="32" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="130" y="158" text-anchor="middle" font-size="10" font-weight="bold" fill="#92400e">GOLD</text>
  <text x="130" y="172" text-anchor="middle" font-size="8" fill="#b45309">Prioridade máxima • Histórico ≥95</text>

  <rect x="30" y="183" width="200" height="32" rx="4" fill="#e2e8f0" stroke="#94a3b8"/>
  <text x="130" y="196" text-anchor="middle" font-size="10" font-weight="bold" fill="#475569">SILVER</text>
  <text x="130" y="210" text-anchor="middle" font-size="8" fill="#64748b">Prioridade média • Histórico 85-94</text>

  <rect x="30" y="221" width="200" height="32" rx="4" fill="#fef2f2" stroke="#fca5a5"/>
  <text x="130" y="234" text-anchor="middle" font-size="10" font-weight="bold" fill="#991b1b">BRONZE</text>
  <text x="130" y="248" text-anchor="middle" font-size="8" fill="#b91c1c">Quota restrita • Novo ou baixo score</text>

  <text x="130" y="275" text-anchor="middle" font-size="9" fill="#475569">Cada agente tem:</text>
  <text x="130" y="292" text-anchor="middle" font-size="9" fill="#1e40af">• Allowance diário de tokens</text>
  <text x="130" y="308" text-anchor="middle" font-size="9" fill="#1e40af">• Allowance semanal agregado</text>
  <text x="130" y="324" text-anchor="middle" font-size="9" fill="#1e40af">• Prioridade de fila baseada em tier</text>
  <text x="130" y="348" text-anchor="middle" font-size="9" fill="#1e3a5f" font-weight="bold">Regra: "quem produz mais qualidade,</text>
  <text x="130" y="364" text-anchor="middle" font-size="9" fill="#1e3a5f" font-weight="bold">recebe mais recursos"</text>

  <!-- Pilar 2: Economia -->
  <rect x="260" y="55" width="230" height="350" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <rect x="260" y="55" width="230" height="40" rx="8" fill="#22c55e"/>
  <text x="375" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">ECONOMIA</text>

  <text x="375" y="115" text-anchor="middle" font-size="10" font-weight="bold" fill="#14532d">Fee Market Dinâmico</text>
  <text x="375" y="132" text-anchor="middle" font-size="9" fill="#475569">Preço dos tokens varia com demanda</text>

  <rect x="280" y="148" width="190" height="55" rx="5" fill="#fff" stroke="#86efac"/>
  <text x="375" y="168" text-anchor="middle" font-size="10" font-weight="bold" fill="#166534">STAKING</text>
  <text x="375" y="184" text-anchor="middle" font-size="9" fill="#475569">Agentes "apostam" tokens</text>
  <text x="375" y="198" text-anchor="middle" font-size="8" fill="#64748b">Lock: 7 dias • Ganham prioridade</text>

  <rect x="280" y="212" width="190" height="55" rx="5" fill="#fff" stroke="#86efac"/>
  <text x="375" y="232" text-anchor="middle" font-size="10" font-weight="bold" fill="#166534">SLASHING</text>
  <text x="375" y="248" text-anchor="middle" font-size="9" fill="#475569">Confisco de stake</text>
  <text x="375" y="262" text-anchor="middle" font-size="8" fill="#64748b">Por comportamento malicioso</text>

  <text x="375" y="295" text-anchor="middle" font-size="9" fill="#475569">Mecanismos de incentivo:</text>
  <text x="375" y="315" text-anchor="middle" font-size="9" fill="#166534">• Recompensa por alta qualidade</text>
  <text x="375" y="335" text-anchor="middle" font-size="9" fill="#166534">• Penalidade por desperdício</text>
  <text x="375" y="355" text-anchor="middle" font-size="9" fill="#166534">• Mercado auto-regulado</text>
  <text x="375" y="378" text-anchor="middle" font-size="9" fill="#14532d" font-weight="bold">Regra: "stake-first: para usar,</text>
  <text x="375" y="394" text-anchor="middle" font-size="9" fill="#14532d" font-weight="bold">aposte; para abusar, perca"</text>

  <!-- Pilar 3: Auditoria -->
  <rect x="505" y="55" width="230" height="350" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <rect x="505" y="55" width="230" height="40" rx="8" fill="#ef4444"/>
  <text x="620" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">AUDITORIA</text>

  <text x="620" y="115" text-anchor="middle" font-size="10" font-weight="bold" fill="#991b1b">Ledger Imutável</text>
  <text x="620" y="132" text-anchor="middle" font-size="9" fill="#475569">Hash SHA-256 por transação</text>

  <rect x="525" y="148" width="190" height="55" rx="5" fill="#fff" stroke="#fca5a5"/>
  <text x="620" y="168" text-anchor="middle" font-size="10" font-weight="bold" fill="#b91c1c">RASTREABILIDADE</text>
  <text x="620" y="184" text-anchor="middle" font-size="9" fill="#475569">Quem usou • Quando • Quanto</text>
  <text x="620" y="198" text-anchor="middle" font-size="8" fill="#64748b">Resultado do uso (score gerado)</text>

  <rect x="525" y="212" width="190" height="55" rx="5" fill="#fff" stroke="#fca5a5"/>
  <text x="620" y="232" text-anchor="middle" font-size="10" font-weight="bold" fill="#b91c1c">ANOMALIAS</text>
  <text x="620" y="248" text-anchor="middle" font-size="9" fill="#475569">Detecção de padrões suspeitos</text>
  <text x="620" y="262" text-anchor="middle" font-size="8" fill="#64748b">Alto consumo × baixa qualidade</text>

  <text x="620" y="295" text-anchor="middle" font-size="9" fill="#475569">Garantias:</text>
  <text x="620" y="315" text-anchor="middle" font-size="9" fill="#dc2626">• Imutabilidade (SHA-256)</text>
  <text x="620" y="335" text-anchor="middle" font-size="9" fill="#dc2626">• Reconciliação de transações</text>
  <text x="620" y="355" text-anchor="middle" font-size="9" fill="#dc2626">• Auditoria em tempo real</text>
  <text x="620" y="378" text-anchor="middle" font-size="9" fill="#991b1b" font-weight="bold">Regra: "toda transação é</text>
  <text x="620" y="394" text-anchor="middle" font-size="9" fill="#991b1b" font-weight="bold">permanente e rastreável"</text>

  <!-- Rodapé -->
  <rect x="100" y="418" width="550" height="18" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="375" y="432" text-anchor="middle" font-size="9" fill="#475569">Validado por 29 CTs TDD (100% aprovados) • SPEC-022 (Governança) + SPEC-023 (Economia) + SPEC-024 (Auditoria)</text>
</svg>
